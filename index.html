<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Camera Đóng Dấu</title>
<style>
  :root{ --accent:#FFB300; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; background:#000; overflow:hidden;
    overscroll-behavior:none; touch-action:manipulation;
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:#fff; user-select:none; -webkit-user-select:none; }
  #app{ position:fixed; inset:0; background:#000; }
  #video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#000; }
  #video.mirror{ transform:scaleX(-1); }
  #liveStamp{ position:absolute; inset:0; pointer-events:none; }

  /* Top bar */
  .topbar{ position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; }
  .gbtn{ width:44px; height:44px; border:none; border-radius:50%;
    background:rgba(20,20,22,.42); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    color:#fff; font-size:20px; display:grid; place-items:center; cursor:pointer;
    transition:transform .12s, background .2s; }
  .gbtn:active{ transform:scale(.9); }
  .gbtn.on{ background:var(--accent); color:#111; }
  .loc-chip{ flex:1; min-width:0; height:44px; display:flex; align-items:center; gap:8px;
    padding:0 16px; border-radius:22px; background:rgba(20,20,22,.42);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); cursor:pointer;
    transition:transform .12s; }
  .loc-chip:active{ transform:scale(.98); }
  .loc-chip .pin{ color:var(--accent); font-size:15px; flex:none; }
  .loc-chip .txt{ font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .loc-chip .pen{ margin-left:auto; opacity:.6; font-size:13px; flex:none; }

  /* Bottom controls */
  .controls{ position:absolute; left:0; right:0; bottom:0; z-index:5;
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    padding:24px 32px calc(env(safe-area-inset-bottom) + 26px); }
  .shutter{ grid-column:2; width:76px; height:76px; border-radius:50%;
    background:transparent; border:4px solid rgba(255,255,255,.9); padding:5px; cursor:pointer;
    display:grid; place-items:center; transition:transform .1s; }
  .shutter:active{ transform:scale(.92); }
  .shutter .core{ width:100%; height:100%; border-radius:50%; background:#fff; transition:background .15s; }
  .shutter:active .core{ background:#e6e6e6; }
  .side-r{ grid-column:3; justify-self:end; }
  .side-l{ grid-column:1; justify-self:start; }

  /* Flash + status */
  #flash{ position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:8; }
  #flash.go{ animation:flash .32s ease-out; }
  @keyframes flash{ 0%{opacity:.85;} 100%{opacity:0;} }
  .status{ position:absolute; inset:0; z-index:9; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center; padding:32px;
    background:rgba(0,0,0,.72); backdrop-filter:blur(6px); }
  .status.show{ display:flex; }
  .status .ico{ font-size:46px; }
  .status .msg{ font-size:15px; line-height:1.55; color:#dcdce0; max-width:340px; }
  .btn{ border:none; border-radius:14px; padding:14px 26px; font-size:15px; font-weight:700;
    cursor:pointer; background:var(--accent); color:#111; transition:transform .12s, opacity .2s; }
  .btn:active{ transform:scale(.96); }
  .btn.ghost{ background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.5); }

  /* Preview */
  #preview{ position:absolute; inset:0; z-index:10; background:#000; display:none;
    flex-direction:column; }
  #preview.show{ display:flex; }
  #preview .imgwrap{ flex:1; min-height:0; display:grid; place-items:center; padding:calc(env(safe-area-inset-top) + 8px) 8px 8px; }
  #previewImg{ max-width:100%; max-height:100%; border-radius:10px; }
  #preview .pcontrols{ display:flex; gap:14px; padding:18px 22px calc(env(safe-area-inset-bottom) + 24px); }
  #preview .pcontrols .btn{ flex:1; padding:16px; }

  /* Settings sheet */
  .backdrop{ position:absolute; inset:0; z-index:14; background:rgba(0,0,0,.5); opacity:0;
    pointer-events:none; transition:opacity .25s; }
  .backdrop.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:15;
    background:#161618; border-radius:22px 22px 0 0; padding:8px 22px calc(env(safe-area-inset-bottom) + 26px);
    transform:translateY(110%); transition:transform .3s cubic-bezier(.2,.8,.2,1); }
  .sheet.show{ transform:translateY(0); }
  .grabber{ width:40px; height:4px; border-radius:2px; background:#48484c; margin:8px auto 16px; }
  .sheet h3{ margin:0 0 18px; font-size:17px; }
  .row{ margin-bottom:22px; }
  .row .lab{ font-size:13px; color:#9a9aa0; margin-bottom:10px; font-weight:600; }
  .swatches{ display:flex; gap:12px; }
  .sw{ width:36px; height:36px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform .1s; }
  .sw:active{ transform:scale(.9); }
  .sw.sel{ border-color:#fff; }
  .seg{ display:flex; background:#0e0e10; border-radius:12px; padding:4px; }
  .seg button{ flex:1; border:none; background:transparent; color:#9a9aa0; padding:9px;
    border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; }
  .seg button.sel{ background:var(--accent); color:#111; }
  .togg{ display:flex; align-items:center; justify-content:space-between; }
  .switch{ width:50px; height:30px; border-radius:15px; background:#3a3a3e; position:relative; cursor:pointer; transition:background .2s; }
  .switch.on{ background:var(--accent); }
  .switch .knob{ position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; transition:left .2s; }
  .switch.on .knob{ left:23px; }
</style>
</head>
<body>
<div id="app">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="liveStamp"></canvas>
  <div id="flash"></div>

  <div class="topbar">
    <button class="gbtn" id="btnSettings" title="Cài đặt">⚙</button>
    <div class="loc-chip" id="locChip">
      <span class="pin">📍</span>
      <span class="txt" id="locTxt">Đang lấy vị trí…</span>
      <span class="pen">✎</span>
    </div>
    <button class="gbtn" id="btnTorch" title="Đèn flash" hidden>⚡</button>
  </div>

  <div class="controls">
    <button class="gbtn side-l" id="btnRefresh" title="Lấy lại vị trí">↻</button>
    <button class="shutter" id="btnShutter" title="Chụp"><span class="core"></span></button>
    <button class="gbtn side-r" id="btnFlip" title="Đổi camera">⟲</button>
  </div>

  <div class="status" id="status">
    <div class="ico">📷</div>
    <div class="msg" id="statusMsg"></div>
    <button class="btn" id="btnRetry">Mở camera</button>
  </div>
</div>

<!-- Preview -->
<div id="preview">
  <div class="imgwrap"><img id="previewImg" alt="Ảnh đã chụp"></div>
  <div class="pcontrols">
    <button class="btn ghost" id="btnRetake">Chụp lại</button>
    <button class="btn" id="btnSave">Lưu ảnh</button>
  </div>
</div>

<!-- Settings -->
<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="grabber"></div>
  <h3>Cài đặt tem</h3>
  <div class="row">
    <div class="lab">Màu nhấn</div>
    <div class="swatches" id="swatches"></div>
  </div>
  <div class="row">
    <div class="lab">Vị trí tem</div>
    <div class="seg" id="posSeg">
      <button data-pos="bl">Trái</button>
      <button data-pos="bc">Giữa</button>
      <button data-pos="br">Phải</button>
    </div>
  </div>
  <div class="row togg">
    <div class="lab" style="margin:0;">Hiện giây</div>
    <div class="switch" id="secSwitch"><span class="knob"></span></div>
  </div>
  <div class="row togg">
    <div class="lab" style="margin:0;">Hiện thứ trong tuần</div>
    <div class="switch" id="wdSwitch"><span class="knob"></span></div>
  </div>
</div>

<canvas id="capCanvas" hidden></canvas>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var app=$("app"), video=$("video"), live=$("liveStamp"), cap=$("capCanvas");
  var status=$("status"), statusMsg=$("statusMsg"), flash=$("flash");
  var preview=$("preview"), previewImg=$("previewImg");
  var locTxt=$("locTxt");

  var ACCENTS=["#FFB300","#FF3B30","#0A84FF","#30D158","#FF2D55","#FFFFFF"];
  var WD=["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];

  var state={ time:"", date:"", weekday:"", location:"Đang lấy vị trí…",
    accent:"#FFB300", pos:"bl", seconds:true, showWeekday:true };
  var facing="environment", stream=null, track=null, torchOn=false, lastBlob=null;

  function pad(n){ return n<10 ? "0"+n : ""+n; }

  /* ---------- Clock ---------- */
  function tick(){
    var d=new Date();
    state.time = pad(d.getHours())+":"+pad(d.getMinutes()) + (state.seconds ? ":"+pad(d.getSeconds()) : "");
    state.date = pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();
    state.weekday = WD[d.getDay()];
    drawLive();
  }

  /* ---------- Stamp drawing (shared by preview + capture) ---------- */
  function roundRect(ctx,x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function drawPin(ctx,cx,cy,r,color){
    ctx.save();
    ctx.shadowColor="transparent";
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(cx, cy + r*2.15);
    ctx.bezierCurveTo(cx - r*1.32, cy + r*0.55, cx - r, cy - r*0.95, cx, cy - r*0.95);
    ctx.bezierCurveTo(cx + r, cy - r*0.95, cx + r*1.32, cy + r*0.55, cx, cy + r*2.15);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(cx, cy, r*0.46, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  function fontStr(px,w){ return w+" "+px+"px -apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif"; }

  function drawStamp(ctx,W,H,s){
    if(!W||!H) return;
    var k=W/1000;
    var padIn=26*k, barW=7*k, barGap=15*k, gap=11*k;
    var timeF=54*k, subF=30*k;
    var lines=[];
    lines.push({txt:s.time, f:timeF, w:700, pin:false});
    var dateLine = s.showWeekday ? (s.weekday+", "+s.date) : s.date;
    lines.push({txt:dateLine, f:subF, w:500, pin:false});
    lines.push({txt:s.location, f:subF, w:500, pin:true});

    var pinR=subF*0.42, pinPad=pinR*2 + 9*k;
    var maxW=0, totalH=padIn;
    for(var i=0;i<lines.length;i++){
      ctx.font=fontStr(lines[i].f,lines[i].w);
      var tw=ctx.measureText(lines[i].txt).width + (lines[i].pin?pinPad:0);
      if(tw>maxW) maxW=tw;
      totalH += lines[i].f + (i<lines.length-1?gap:0);
    }
    totalH += padIn + subF*0.18;
    var contentX = padIn + barW + barGap;
    var panelW = contentX + maxW + padIn;
    var panelH = totalH;

    var margin=22*k, px, py=H - margin - panelH;
    if(s.pos==="bl") px=margin;
    else if(s.pos==="bc") px=(W-panelW)/2;
    else px=W - margin - panelW;
    if(px<margin) px=margin;

    // panel
    roundRect(ctx,px,py,panelW,panelH,17*k);
    ctx.fillStyle="rgba(0,0,0,0.42)";
    ctx.fill();
    // accent bar
    roundRect(ctx, px+padIn, py+padIn, barW, panelH-padIn*2, barW/2);
    ctx.fillStyle=s.accent;
    ctx.fill();

    // text
    var tx=px+contentX, y=py+padIn;
    ctx.textBaseline="top";
    ctx.shadowColor="rgba(0,0,0,0.55)";
    ctx.shadowBlur=6*k; ctx.shadowOffsetY=1*k;
    for(var j=0;j<lines.length;j++){
      var L=lines[j];
      ctx.font=fontStr(L.f,L.w);
      ctx.fillStyle="#fff";
      var ox=tx;
      if(L.pin){
        drawPin(ctx, tx+pinR, y+L.f*0.5, pinR, s.accent);
        ox=tx+pinPad;
      }
      ctx.fillText(L.txt, ox, y);
      y += L.f + gap;
    }
    ctx.shadowColor="transparent";
  }

  function drawLive(){
    if(!live.width||!live.height) return;
    var ctx=live.getContext("2d");
    ctx.clearRect(0,0,live.width,live.height);
    drawStamp(ctx, live.width, live.height, state);
  }

  function resizeLive(){
    var r=app.getBoundingClientRect();
    var dpr=window.devicePixelRatio||1;
    live.width=Math.round(r.width*dpr);
    live.height=Math.round(r.height*dpr);
    live.style.width=r.width+"px";
    live.style.height=r.height+"px";
    drawLive();
  }

  /* ---------- Camera ---------- */
  function stopCamera(){
    if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; track=null; }
  }
  function showStatus(msg){ statusMsg.textContent=msg; status.classList.add("show"); }
  function hideStatus(){ status.classList.remove("show"); }

  function startCamera(){
    stopCamera();
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showStatus("Trình duyệt không hỗ trợ camera, hoặc trang chưa chạy qua HTTPS. Hãy mở bằng địa chỉ https:// (ví dụ GitHub Pages).");
      return;
    }
    navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:facing }, width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    }).then(function(s){
      stream=s; video.srcObject=s;
      var p=video.play();
      if(p&&p.catch) p.catch(function(){});
      track=s.getVideoTracks()[0];
      setupTorch();
      video.classList.toggle("mirror", facing==="user");
      setTimeout(resizeLive,120);
      hideStatus();
    }).catch(function(e){
      var m="Không mở được camera. Hãy cấp quyền Camera cho trang này rồi bấm lại.";
      if(!window.isSecureContext) m="Camera cần chạy qua HTTPS. Hãy mở trang bằng địa chỉ https:// (ví dụ GitHub Pages) — mở trực tiếp file trên điện thoại sẽ không có camera.";
      else if(e && (e.name==="NotAllowedError")) m="Bạn đã chặn quyền Camera. Vào cài đặt trình duyệt để cho phép, rồi bấm lại.";
      else if(e && e.name==="NotFoundError") m="Không tìm thấy camera trên thiết bị.";
      showStatus(m);
    });
  }

  function setupTorch(){
    var btn=$("btnTorch");
    var caps = (track && track.getCapabilities) ? track.getCapabilities() : {};
    if(caps && caps.torch){ btn.hidden=false; }
    else { btn.hidden=true; torchOn=false; btn.classList.remove("on"); }
  }
  function toggleTorch(){
    if(!track) return;
    torchOn=!torchOn;
    track.applyConstraints({ advanced:[{ torch:torchOn }] })
      .then(function(){ $("btnTorch").classList.toggle("on", torchOn); })
      .catch(function(){ torchOn=false; });
  }
  function flip(){
    facing = (facing==="environment") ? "user" : "environment";
    startCamera();
  }

  /* ---------- Location ---------- */
  function locate(){
    state.location="Đang lấy vị trí…"; locTxt.textContent=state.location; drawLive();
    if(!navigator.geolocation){ setLoc("Chạm ✎ để nhập địa điểm"); return; }
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat=pos.coords.latitude, lon=pos.coords.longitude;
      fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=vi")
        .then(function(r){ return r.json(); })
        .then(function(j){
          var prov = j.principalSubdivision || j.city || j.locality || "";
          var country = j.countryName || "Việt Nam";
          setLoc((prov? prov+", ":"") + country);
        })
        .catch(function(){ setLoc(lat.toFixed(4)+", "+lon.toFixed(4)); });
    }, function(){
      setLoc("Chạm ✎ để nhập địa điểm");
    }, { enableHighAccuracy:true, timeout:10000, maximumAge:60000 });
  }
  function setLoc(t){ state.location=t; locTxt.textContent=t; drawLive(); }
  function editLoc(){
    var v=prompt("Nhập địa điểm hiển thị trên ảnh:", state.location);
    if(v!==null && v.trim()!=="") setLoc(v.trim());
  }

  /* ---------- Capture ---------- */
  function capture(){
    var vw=video.videoWidth, vh=video.videoHeight;
    if(!vw||!vh){ return; }
    var r=app.getBoundingClientRect();
    var cw=r.width, ch=r.height;
    var scale=Math.max(cw/vw, ch/vh);
    var sW=cw/scale, sH=ch/scale;
    var sx=(vw-sW)/2, sy=(vh-sH)/2;
    cap.width=Math.round(sW); cap.height=Math.round(sH);
    var ctx=cap.getContext("2d");
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality="high";
    ctx.save();
    if(facing==="user"){ ctx.translate(cap.width,0); ctx.scale(-1,1); }
    ctx.drawImage(video, sx, sy, sW, sH, 0, 0, cap.width, cap.height);
    ctx.restore();
    drawStamp(ctx, cap.width, cap.height, state);

    flash.classList.remove("go"); void flash.offsetWidth; flash.classList.add("go");
    cap.toBlob(function(b){
      lastBlob=b;
      previewImg.src=URL.createObjectURL(b);
      preview.classList.add("show");
    }, "image/jpeg", 0.95);
  }

  function fname(){
    var d=new Date();
    return "Camera_"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"_"+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds())+".jpg";
  }
  function savePhoto(){
    if(!lastBlob) return;
    var file=new File([lastBlob], fname(), { type:"image/jpeg" });
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      navigator.share({ files:[file] }).catch(function(){});
      return;
    }
    var a=document.createElement("a");
    a.href=URL.createObjectURL(lastBlob);
    a.download=fname();
    document.body.appendChild(a); a.click();
    setTimeout(function(){ a.remove(); }, 500);
  }
  function retake(){ preview.classList.remove("show"); }

  /* ---------- Settings UI ---------- */
  function applyAccent(){
    document.documentElement.style.setProperty("--accent", state.accent);
    document.querySelectorAll(".sw").forEach(function(el){
      el.classList.toggle("sel", el.getAttribute("data-c")===state.accent);
    });
    drawLive();
  }
  function buildSwatches(){
    var box=$("swatches");
    ACCENTS.forEach(function(c){
      var el=document.createElement("div");
      el.className="sw"; el.style.background=c; el.setAttribute("data-c",c);
      if(c==="#FFFFFF") el.style.border="2.5px solid #555";
      el.onclick=function(){ state.accent=c; applyAccent(); };
      box.appendChild(el);
    });
  }
  function updatePosSeg(){
    document.querySelectorAll("#posSeg button").forEach(function(b){
      b.classList.toggle("sel", b.getAttribute("data-pos")===state.pos);
    });
  }
  function openSheet(){ $("backdrop").classList.add("show"); $("sheet").classList.add("show"); }
  function closeSheet(){ $("backdrop").classList.remove("show"); $("sheet").classList.remove("show"); }

  /* ---------- Wire up ---------- */
  $("btnShutter").onclick=capture;
  $("btnFlip").onclick=flip;
  $("btnTorch").onclick=toggleTorch;
  $("btnRefresh").onclick=locate;
  $("btnRetry").onclick=function(){ startCamera(); };
  $("locChip").onclick=editLoc;
  $("btnSettings").onclick=openSheet;
  $("backdrop").onclick=closeSheet;
  $("btnRetake").onclick=retake;
  $("btnSave").onclick=savePhoto;

  document.querySelectorAll("#posSeg button").forEach(function(b){
    b.onclick=function(){ state.pos=b.getAttribute("data-pos"); updatePosSeg(); drawLive(); };
  });
  $("secSwitch").onclick=function(){ state.seconds=!state.seconds; this.classList.toggle("on",state.seconds); tick(); };
  $("wdSwitch").onclick=function(){ state.showWeekday=!state.showWeekday; this.classList.toggle("on",state.showWeekday); drawLive(); };

  window.addEventListener("resize", resizeLive);
  window.addEventListener("orientationchange", function(){ setTimeout(resizeLive,300); });
  video.addEventListener("loadedmetadata", resizeLive);

  /* Init */
  buildSwatches();
  applyAccent();
  updatePosSeg();
  $("secSwitch").classList.toggle("on", state.seconds);
  $("wdSwitch").classList.toggle("on", state.showWeekday);
  resizeLive();
  tick();
  setInterval(tick, 1000);
  startCamera();
  locate();
})();
</script>
</body>
</html>
